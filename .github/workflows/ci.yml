name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Placeholders — the compile never opens a DB connection (all DB pages
      # are force-dynamic), it only needs the vars to exist for Prisma/Next.
      DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
      DIRECT_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
      NEXTAUTH_SECRET: "ci-placeholder-secret"
      NEXTAUTH_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check and build (no database needed)
        run: npx next build
